[mypy]
ignore_missing_imports = True

# Mixin files: mypy cannot see attributes provided by the concrete base class at runtime.
# These are correct code — suppress the false positives rather than pollute them with stubs.

[mypy-pytoolbox.django.models.mixins]
ignore_errors = True

[mypy-pytoolbox.django.models.metaclass]
ignore_errors = True

[mypy-pytoolbox.django.models.decorators]
ignore_errors = True

[mypy-pytoolbox.django.views.mixins]
ignore_errors = True

[mypy-pytoolbox.django.forms.mixins]
ignore_errors = True

[mypy-pytoolbox.django.test.mixins]
ignore_errors = True

[mypy-pytoolbox.django.test.runner.mixins]
ignore_errors = True

[mypy-pytoolbox.django.utils.logging]
ignore_errors = True

[mypy-pytoolbox.rest_framework.views.mixins]
ignore_errors = True

[mypy-pytoolbox.rest_framework.serializers.mixins]
ignore_errors = True

[mypy-pytoolbox.rest_framework.metadata.mixins]
ignore_errors = True

[mypy-pytoolbox.django_filter.filterset.mixins]
ignore_errors = True

[mypy-pytoolbox.django_formtools.views.mixins]
ignore_errors = True

[mypy-pytoolbox.django_datatable_view.views.mixins]
ignore_errors = True

[mypy-pytoolbox.selenium.test]
ignore_errors = True

[mypy-pytoolbox.unittest]
ignore_errors = True
